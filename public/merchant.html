<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merchant Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body class="bg-gray-100 p-5">
    <div class="mb-6">
        <h2 class="text-2xl font-bold">لوحة التحكم ⚙️</h2>
        <p class="text-gray-500 text-sm">أهلاً بك في غرفة عمليات متجرك</p>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
        <div class="bg-white p-4 rounded-2xl shadow-sm text-center">
            <p class="text-xs text-gray-400">إجمالي المبيعات</p>
            <p class="text-xl font-bold text-green-600">0 ج.م</p>
        </div>
        <div class="bg-white p-4 rounded-2xl shadow-sm text-center">
            <p class="text-xs text-gray-400">طلبات جديدة</p>
            <p class="text-xl font-bold text-blue-600">0</p>
        </div>
    </div>

    <div class="space-y-4">
        <button class="w-full bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center font-bold">
            <span>📦 إدارة المنتجات</span>
            <span class="text-gray-300">❯</span>
        </button>
        <button class="w-full bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center font-bold">
            <span>🤖 إعدادات موظفي الـ AI</span>
            <span class="text-gray-300">❯</span>
        </button>
        <button class="w-full bg-white p-4 rounded-2xl shadow-sm flex justify-between items-center font-bold text-red-500">
            <span>⚠️ إيقاف المتجر مؤقتاً</span>
        </button>
    </div>
</body>
</html>
