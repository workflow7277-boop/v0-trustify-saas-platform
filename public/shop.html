<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trustify Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .product-card { transition: transform 0.2s; }
        .product-card:active { transform: scale(0.95); }
        .cart-badge { position: absolute; top: -5px; right: -5px; background: red; color: white; border-radius: 50%; padding: 2px 6px; font-size: 10px; }
    </style>
</head>
<body class="bg-gray-50 pb-20">
    <header class="bg-white p-4 shadow-sm sticky top-0 z-50 flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-600">Trustify Store 🛒</h1>
        <div class="relative" onclick="openCart()">
            <i class="fa-solid fa-basket-shopping text-2xl text-gray-700"></i>
            <span id="cartCount" class="cart-badge">0</span>
        </div>
    </header>

    <div class="p-4 flex gap-2 overflow-x-auto no-wrap">
        <button class="bg-blue-600 text-white px-4 py-2 rounded-full text-sm whitespace-nowrap">الكل</button>
        <button class="bg-white border px-4 py-2 rounded-full text-sm whitespace-nowrap">ملابس</button>
        <button class="bg-white border px-4 py-2 rounded-full text-sm whitespace-nowrap">إلكترونيات</button>
    </div>

    <main class="p-4 grid grid-cols-2 gap-4" id="productGrid">
        </main>

    <div id="cartSheet" class="fixed inset-0 bg-black bg-opacity-50 hidden z-[60] flex items-end">
        <div class="bg-white w-full rounded-t-3xl p-6 shadow-2xl">
            <h3 class="text-lg font-bold mb-4 text-center">تأكيد الطلب 🧾</h3>
            <div id="cartItems" class="space-y-3 mb-4 max-h-40 overflow-y-auto"></div>
            <div class="border-t pt-4 space-y-3">
                <div class="flex justify-between font-bold"><span>الإجمالي:</span><span id="totalPrice">0</span></div>
                <input type="text" id="customerName" placeholder="الاسم بالكامل" class="w-full p-2 border rounded">
                <input type="tel" id="customerPhone" placeholder="رقم الموبايل (واتساب)" class="w-full p-2 border rounded">
                <button onclick="sendOrder()" class="w-full bg-green-600 text-white p-3 rounded-xl font-bold">تأكيد وشراء عبر واتساب</button>
            </div>
            <button onclick="closeCart()" class="w-full mt-2 text-gray-500 text-sm">إغلاق</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let cart = [];
        const products = [
            { id: 1, name: "تيشرت قطن", price: 250, img: "https://via.placeholder.com/150" },
            { id: 2, name: "ساعة رقمية", price: 450, img: "https://via.placeholder.com/150" }
        ];

        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => `
                <div class="product-card bg-white rounded-2xl shadow-sm p-3 border border-gray-100">
                    <img src="${p.img}" class="w-full h-32 object-cover rounded-xl mb-2">
                    <h4 class="font-bold text-sm mb-1">${p.name}</h4>
                    <p class="text-blue-600 font-bold text-sm mb-2">${p.price} ج.م</p>
                    <button onclick="addToCart(${p.id})" class="w-full bg-gray-900 text-white py-2 rounded-lg text-xs">+ إضافة للسلة</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            document.getElementById('cartCount').innerText = cart.length;
            tg.HapticFeedback.impactOccurred('light');
        }

        function openCart() { document.getElementById('cartSheet').classList.remove('hidden'); renderCartItems(); }
        function closeCart() { document.getElementById('cartSheet').classList.add('hidden'); }

        function renderCartItems() {
            const container = document.getElementById('cartItems');
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += item.price;
                return `<div class="flex justify-between text-sm"><span>${item.name}</span><span>${item.price} ج.م</span></div>`;
            }).join('');
            document.getElementById('totalPrice').innerText = total + " ج.م";
        }

        function sendOrder() {
            const name = document.getElementById('customerName').value;
            const phone = document.getElementById('customerPhone').value;
            if(!name || !phone) return alert("من فضلك كمل بياناتك");
            
            // هنا السيستم الأوتوميشن بيبعت الأوردر للتاجر
            alert("تم إرسال طلبك! التاجر سيتواصل معك لتأكيد الدفع.");
            tg.close();
        }

        renderProducts();
    </script>
</body>
</html>
